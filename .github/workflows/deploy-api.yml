name: Deploy API
on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v1
      - uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install npm dependencies
        run: npm i -g pnpm && pnpm install --frozen-lockfile

      # @midevils/sdk's package entry points at dist/, which isn't in the repo,
      # so the worker bundle can't resolve it until the package is built. Run
      # tsup only (the JS bundle) and skip the package `build`'s tsc declaration
      # step, which fails on stale generated types and isn't needed to bundle.
      - name: Build SDK client
        run: pnpm --filter @midevils/sdk exec tsup

      - name: 'Build and deploy API'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'apps/api'
          wranglerVersion: '4.8.0'
          packageManager: pnpm

name: Deploy client
on:
  push:
    branches: [main]
    paths:
      - 'apps/client/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v1
      - uses: actions/setup-node@v3
        with:
          # Node 22.9 ships a cjs-module-lexer that fails to detect wrangler's
          # named exports, breaking @cloudflare/vite-plugin's ESM import during
          # the vite build. Node 24 detects them.
          node-version: 24

      - name: Install npm dependencies
        run: npm i -g pnpm && pnpm install --frozen-lockfile

      # @midevils/sdk's package entry points at dist/, which isn't in the repo,
      # so the client bundle can't resolve it until the package is built. Run
      # tsup only (the JS bundle) and skip the package `build`'s tsc declaration
      # step, which fails on stale generated types and isn't needed to bundle.
      - name: Build SDK client
        run: pnpm --filter @midevils/sdk exec tsup

      - name: 'Build and deploy client'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'apps/client'
          wranglerVersion: '4.8.0'
          packageManager: pnpm
          preCommands: 'pnpm build'
